default:
    extensions:
        FriendsOfBehat\SymfonyExtension:
            bootstrap: tests/bootstrap_behat.php
            kernel:
                class: App\Kernel
                environment: test
                debug: true

    suites:
        default:
            paths:
                - '%paths.base%/features'
            contexts:
                - App\Behat\DatabaseContext
                - App\Behat\HealthContext
                - App\Behat\SurrogateLifecycleContext
                - App\Behat\WebhookContext
                - App\Behat\MailContext
                - App\Behat\InboundContext
                - App\Behat\PostingContext
